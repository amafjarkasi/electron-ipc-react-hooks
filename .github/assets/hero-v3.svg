<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1133;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradients -->
    <linearGradient id="electronGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#61DAFB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ipcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E040FB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#61DAFB" />
      <stop offset="35%" style="stop-color:#7C4DFF" />
      <stop offset="70%" style="stop-color:#E040FB" />
      <stop offset="100%" style="stop-color:#4FC3F7" />
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#7C4DFF;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#E040FB;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#61DAFB;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#7C4DFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E040FB;stop-opacity:0.6" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Grid pattern overlay -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/><line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/><line x1="800" y1="0" x2="800" y2="420"/>
    <line x1="900" y1="0" x2="900" y2="420"/><line x1="1000" y1="0" x2="1000" y2="420"/>
    <line x1="1100" y1="0" x2="1100" y2="420"/>
  </g>

  <!-- Decorative floating particles -->
  <circle cx="80" cy="60" r="2" fill="#4FC3F7" opacity="0.3"/>
  <circle cx="1120" cy="80" r="1.5" fill="#E040FB" opacity="0.4"/>
  <circle cx="200" cy="380" r="1.5" fill="#7C4DFF" opacity="0.3"/>
  <circle cx="950" cy="350" r="2" fill="#61DAFB" opacity="0.25"/>
  <circle cx="1050" cy="180" r="1" fill="#4FC3F7" opacity="0.35"/>
  <circle cx="150" cy="200" r="1" fill="#E040FB" opacity="0.3"/>
  <circle cx="750" cy="50" r="1.5" fill="#7C4DFF" opacity="0.2"/>

  <!-- ===== TITLE AREA ===== -->
  <!-- Main title -->
  <text x="600" y="72" text-anchor="middle" font-size="42" font-weight="800" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="-0.5">
    electron-ipc-react-hooks
  </text>
  
  <!-- Tagline -->
  <text x="600" y="102" text-anchor="middle" font-size="16" fill="#a0a8d0" font-weight="400" letter-spacing="3">
    100% TYPE-SAFE  •  ZERO CODE GEN  •  REACT QUERY NATIVE
  </text>

  <!-- Accent line under title -->
  <rect x="350" y="115" width="500" height="2" fill="url(#glowLine)" rx="1" filter="url(#softGlow)"/>

  <!-- ===== ARCHITECTURE VISUALIZATION ===== -->
  
  <!-- === MAIN PROCESS BOX (Left) === -->
  <g transform="translate(90, 155)">
    <!-- Box background -->
    <rect width="260" height="200" rx="12" fill="#0d1133" stroke="#4FC3F7" stroke-width="1.5" opacity="0.9"/>
    <rect width="260" height="38" rx="12" fill="url(#electronGrad)" opacity="0.15"/>
    <rect x="0" y="26" width="260" height="12" fill="url(#electronGrad)" opacity="0.15"/>
    
    <!-- Header -->
    <circle cx="20" cy="19" r="5" fill="#4FC3F7" opacity="0.8"/>
    <text x="35" y="24" font-size="14" font-weight="700" fill="#4FC3F7" letter-spacing="2">MAIN PROCESS</text>
    <text x="245" y="24" text-anchor="end" font-size="10" fill="#4FC3F7" opacity="0.6">Node.js</text>

    <!-- Code-like content -->
    <text x="16" y="60" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#7C4DFF">const</tspan> router = t.router({
    </text>
    <text x="16" y="78" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#61DAFB">  getUser</tspan>: t.procedure
    </text>
    <text x="16" y="96" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#a0a8d0">    .input</tspan>(z.string())
    </text>
    <text x="16" y="114" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#a0a8d0">    .query</tspan>(({ input }) => {
    </text>
    <text x="16" y="132" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#4FC3F7">      return</tspan> db.find(input)
    </text>
    <text x="16" y="150" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
        }),
    </text>
    <text x="16" y="168" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#61DAFB">  saveUser</tspan>: t.procedure
    </text>
    <text x="16" y="186" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#a0a8d0">    .mutation</tspan>(({ input }) => ...)
    </text>
  </g>

  <!-- === IPC BRIDGE (Center) === -->
  <g transform="translate(420, 155)">
    <!-- Central pipe -->
    <rect x="30" y="80" width="300" height="40" rx="20" fill="url(#ipcGrad)" opacity="0.12" stroke="url(#ipcGrad)" stroke-width="1.5"/>
    
    <!-- Animated data dots -->
    <circle cx="80" cy="100" r="4" fill="#7C4DFF" opacity="0.8" filter="url(#glow)"/>
    <circle cx="140" cy="100" r="3" fill="#E040FB" opacity="0.6" filter="url(#glow)"/>
    <circle cx="180" cy="100" r="5" fill="#7C4DFF" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="240" cy="100" r="3" fill="#E040FB" opacity="0.7" filter="url(#glow)"/>
    <circle cx="290" cy="100" r="4" fill="#7C4DFF" opacity="0.8" filter="url(#glow)"/>

    <!-- IPC label -->
    <text x="180" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="url(#ipcGrad)" letter-spacing="3" filter="url(#glow)">IPC BRIDGE</text>
    <text x="180" y="136" text-anchor="middle" font-size="10" fill="#a0a8d0" opacity="0.7">Type-Safe • Validated • Batched</text>

    <!-- Arrows -->
    <text x="55" y="104" font-size="16" fill="#4FC3F7" opacity="0.8">▸</text>
    <text x="295" y="104" font-size="16" fill="#E040FB" opacity="0.8">▸</text>
  </g>

  <!-- === REACT RENDERER BOX (Right) === -->
  <g transform="translate(850, 155)">
    <!-- Box background -->
    <rect width="260" height="200" rx="12" fill="#0d1133" stroke="#61DAFB" stroke-width="1.5" opacity="0.9"/>
    <rect width="260" height="38" rx="12" fill="url(#reactGrad)" opacity="0.15"/>
    <rect x="0" y="26" width="260" height="12" fill="url(#reactGrad)" opacity="0.15"/>

    <!-- Header -->
    <circle cx="20" cy="19" r="5" fill="#61DAFB" opacity="0.8"/>
    <text x="35" y="24" font-size="14" font-weight="700" fill="#61DAFB" letter-spacing="2">REACT RENDERER</text>
    <text x="245" y="24" text-anchor="end" font-size="10" fill="#61DAFB" opacity="0.6">Hooks</text>

    <!-- Code-like content -->
    <text x="16" y="60" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#7C4DFF">const</tspan> ipc = createReactIpc()
    </text>
    <text x="16" y="82" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
        { data, isLoading } =
    </text>
    <text x="16" y="100" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#61DAFB">  ipc</tspan>.getUser.useQuery(
    </text>
    <text x="16" y="118" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#4FC3F7">    </tspan><tspan fill="#a0a8d0">'user@email.com'</tspan>
    </text>
    <text x="16" y="136" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      )
    </text>
    <text x="16" y="158" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#7C4DFF">const</tspan> mutation =
    </text>
    <text x="16" y="176" font-size="11" fill="#7a82a8" font-family="'Cascadia Code', 'Fira Code', monospace">
      <tspan fill="#61DAFB">  ipc</tspan>.saveUser.useMutation()
    </text>
  </g>

  <!-- ===== BOTTOM BADGES ===== -->
  <g transform="translate(0, 380)">
    <!-- Left badge group -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#4FC3F7" opacity="0.15" stroke="#4FC3F7" stroke-width="0.5"/>
      <text x="50" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#4FC3F7">Queries</text>
    </g>
    <g transform="translate(275, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#7C4DFF" opacity="0.15" stroke="#7C4DFF" stroke-width="0.5"/>
      <text x="50" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#7C4DFF">Mutations</text>
    </g>
    <g transform="translate(390, 0)">
      <rect x="0" y="0" width="120" height="24" rx="12" fill="#E040FB" opacity="0.15" stroke="#E040FB" stroke-width="0.5"/>
      <text x="60" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#E040FB">Subscriptions</text>
    </g>
    <g transform="translate(525, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#4FC3F7" opacity="0.15" stroke="#4FC3F7" stroke-width="0.5"/>
      <text x="50" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#4FC3F7">Channels</text>
    </g>
    <g transform="translate(640, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#7C4DFF" opacity="0.15" stroke="#7C4DFF" stroke-width="0.5"/>
      <text x="50" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#7C4DFF">Zod Valid.</text>
    </g>
    <g transform="translate(755, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#E040FB" opacity="0.15" stroke="#E040FB" stroke-width="0.5"/>
      <text x="50" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#E040FB">Batching</text>
    </g>
    <g transform="translate(870, 0)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#4FC3F7" opacity="0.15" stroke="#4FC3F7" stroke-width="0.5"/>
      <text x="50" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#4FC3F7">DevTools</text>
    </g>
  </g>
</svg>